<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Untracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="header">
      <span class="header__mark" aria-hidden="true">🔗</span>
      <h1 class="header__title">Untracker</h1>
    </header>

    <label class="field-label" for="urlInput">Page URL</label>
    <input type="text" id="urlInput" placeholder="Paste a URL…" />

    <div class="actions">
      <button id="decodeBtn" type="button" class="btn btn--secondary">Decode</button>
    </div>

    <div id="resultMessage" class="result hidden"></div>
    <p id="errorMessage" class="notice notice--error hidden"></p>

    <button id="navigateBtn" type="button" class="btn btn--primary hidden" disabled>Navigate</button>
  </div>

  <script src="decoder.js"></script>
  <script src="popup.js"></script>
</body>
</html>
